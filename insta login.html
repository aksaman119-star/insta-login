<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#fafafa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
}

.login-box{
background:white;
border:1px solid #dbdbdb;
width:350px;
padding:40px;
}

.logo{
font-size:36px;
font-weight:bold;
margin-bottom:30px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #dbdbdb;
border-radius:4px;
background:#fafafa;
}

button{
width:100%;
padding:10px;
background:#0095f6;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#0077cc;
}

.or{
margin:20px 0;
color:#999;
font-size:14px;
}

.fb-login{
color:#385185;
font-weight:bold;
cursor:pointer;
}

.forgot{
margin-top:15px;
font-size:12px;
color:#00376b;
cursor:pointer;
}

.signup{
background:white;
border:1px solid #dbdbdb;
margin-top:10px;
padding:20px;
}

.signup a{
color:#0095f6;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="login-box">

<div class="logo">Instagram</div>

<form>

<input type="text" placeholder="Phone number, username, or email">

<input type="password" placeholder="Password">

<button type="submit">Log In</button>

</form>

<div class="or">OR</div>

<div class="fb-login">Log in with Facebook</div>

<div class="forgot">Forgot password?</div>

</div>

<div class="signup">
Don't have an account? <a href="#">Sign up</a>
</div>

</div>

</body>
</html>
